

[platformio]
; Keep build artifacts outside the project tree to avoid flaky .pio cleanup.
build_dir = C:/PlatformIO/_build/Spectre

[env:esp32-s3-devkitc1-n16r8]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc1-n16r8
framework = arduino
; Archive third-party libraries so Windows doesn't race the linker against
; individual LVGL object generation.
lib_archive = yes

; Flash & PSRAM
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_upload.flash_size = 16MB

; USB CDC
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes
build_unflags =
    -DARDUINO_USB_CDC_ON_BOOT=0

; Upload & monitor
upload_speed = 921600
upload_port = Auto
monitor_speed = 115200
monitor_port = Auto
monitor_rts = 0
monitor_dtr = 0

; Libraries
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8
    h2zero/NimBLE-Arduino@^2.1.0
    lvgl/lvgl @ 9.5.0
    ; OpenDroneID is vendored locally at lib/opendroneid-core-c

; Build flags
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=0
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_PARALLEL_8_BIT
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_CS=6
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DLV_CONF_INCLUDE_SIMPLE
    -I${PROJECT_SRC_DIR}
    -Wno-cpp

